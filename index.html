<meta charset="UTF-8">
<title>AMER-TX-AUS2 S&amp;LP Team Board</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0f1923;--surface:#1a2836;--text:#e8edf2;--text2:#8fa3b8;--muted:#5a7088;--border:#2a3f52;--primary:#3b82f6;--success:#22c55e;--warning:#f59e0b;--error:#ef4444;--info:#06b6d4;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono',Consolas,monospace;--r:8px;--rs:5px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--font);color:var(--text);padding:16px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:46px;height:46px;border-radius:50%}
.header h1{font-size:22px;font-weight:700}
.clock{font-family:var(--mono);font-size:16px;color:var(--text2)}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:8px 16px;font-size:12px;font-weight:600;border-radius:var(--rs) var(--rs) 0 0;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tab:hover{color:var(--text2);background:var(--surface)}
.tab.active{color:var(--primary);background:var(--surface);border-bottom:2px solid var(--primary)}
.page{display:none}.page.active{display:block}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.panel-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-23{display:grid;grid-template-columns:2fr 3fr;gap:16px}
.site-badge{font-size:12px;font-weight:700;font-family:var(--mono);padding:5px 9px;border-radius:var(--rs);min-width:52px;text-align:center;display:inline-block}
.site-stx9{background:#1e3a5f;color:#60a5fa}.site-stx6{background:#1a3b2a;color:#4ade80}.site-dau7{background:#3b2a1a;color:#fb923c}.site-dua3{background:#2d1a3b;color:#c084fc}.site-wby1{background:#1a3b3b;color:#2dd4bf}.site-aus2{background:#3b1a2a;color:#f472b6}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:11px;margin-bottom:8px}
.card-title{font-size:12px;font-weight:600;margin-bottom:5px}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.card-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.tag-theft{background:#3b1111;color:#f87171}.tag-wim{background:#3b2a0a;color:#fbbf24}.tag-audit{background:#0c2840;color:#38bdf8}.tag-exception{background:#2d1a3b;color:#c084fc}.tag-lynceus{background:#1a2840;color:#818cf8}.tag-route{background:#1a3344;color:#67e8f9}.tag-utr{background:#3b1111;color:#f87171}.tag-support{background:#1e293b;color:var(--text2)}
.card-detail{font-size:10px;color:var(--muted)}.card-detail span{color:var(--text2);font-weight:500}
.priority-high{background:#3b1111;color:#f87171}.priority-med{background:#3b2a0a;color:#fbbf24}.priority-low{background:#0a2a1a;color:#4ade80}
.progress{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;border-radius:2px;background:var(--primary)}
.task-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.task-col-header{font-size:11px;font-weight:700;text-transform:uppercase;padding:6px 10px;border-radius:var(--rs);margin-bottom:8px;text-align:center}
.col-todo .task-col-header{background:#1e293b;color:var(--text2)}
.col-progress .task-col-header{background:#172554;color:#60a5fa}
.col-done .task-col-header{background:#052e16;color:#4ade80}
.rotation-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);gap:12px}
.rotation-row:last-child{border-bottom:none}
.rotation-assignee{flex:1;font-size:13px;font-weight:500}
.rotation-status{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
.st-pending{background:#1e293b;color:var(--muted)}.st-visited{background:#052e16;color:#4ade80}
.team-row{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);gap:10px}
.team-row:last-child{border-bottom:none}
.team-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px}
.team-name{flex:1;font-size:12px;font-weight:500}
.team-loc{font-size:11px;color:var(--text2);font-family:var(--mono)}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase}
.site-table{width:100%;border-collapse:collapse}
.site-table th{font-size:11px;color:var(--muted);text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.site-table td{padding:10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.status-indicator{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.status-green{background:#052e16;color:#4ade80}.status-yellow{background:#3b2a0a;color:#fbbf24}.status-red{background:#3b1111;color:#f87171}
.note-cell{max-width:300px;font-size:11px;color:var(--text2)}
.footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.sync-badge{padding:5px 10px;border-radius:20px;font-weight:600;font-size:11px}
.sync-live{background:#052e16;color:#4ade80}
.sync-offline{background:#3b2a0a;color:#fbbf24}
</style>

<script>
// ============================================================
// GOOGLE SHEETS CSV URLS
// ============================================================
var DATA_URL = "data.json";

var REFRESH_SECONDS = 30;

// ============================================================
// FETCH DATA FROM GITHUB
// ============================================================
function fetchAll() {
  fetch(DATA_URL + "?_t=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.rotation) {
        DATA = d;
        renderAll();
        document.getElementById("syncBadge").className = "sync-badge sync-live";
        document.getElementById("syncBadge").innerHTML = "&#x2705; Live - GitHub";
        document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true,timeZone:"America/Chicago"});
      }
    })
    .catch(function(e) {
      console.error("Fetch error:", e);
      document.getElementById("syncBadge").className = "sync-badge sync-offline";
      document.getElementById("syncBadge").innerHTML = "&#x26a0; Offline";
    });
}

var TEAM_COLORS = [{bg:"#1e3a5f",fg:"#60a5fa"},{bg:"#3b2a1a",fg:"#fb923c"},{bg:"#1a3b2a",fg:"#4ade80"},{bg:"#2d1a3b",fg:"#c084fc"},{bg:"#1a3b3b",fg:"#2dd4bf"},{bg:"#3b1a2a",fg:"#f472b6"},{bg:"#2a3b1a",fg:"#a3e635"}];

var DATA = { rotation:[], team:[], tasks:[], lynceus:[], route:[], utr:[], wim:[], support:[], projects:[], siteStatus:[] };

// ============================================================
// TAB NAVIGATION
// ============================================================
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.getElementById("page-"+name).classList.add("active");
  var tabs = document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++){if(tabs[i].getAttribute("onclick").indexOf(name)>-1)tabs[i].classList.add("active");}
}

// ============================================================
// RENDERERS
// ============================================================
function siteClass(s) { return "site-"+(s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

function renderStats() {
  var lynceus = DATA.lynceus || [];
  var route = DATA.route || [];
  var utr = DATA.utr || [];
  var wim = DATA.wim || [];
  var support = DATA.support || [];
  var casesCount = lynceus.length + route.length + utr.length + wim.length + support.length;
  var otr = lynceus.length + route.length;
  var wimCount = wim.length;
  var tasksDone = (DATA.tasks||[]).filter(function(t){return (t.Status||t.status)==="Done";}).length;
  var visited = (DATA.rotation||[]).filter(function(r){return (r.Status||r.status)==="Visited";}).length;
  var totalSites = (DATA.rotation||[]).length;
  document.getElementById("statsRow").innerHTML =
    '<div class="stat"><div class="stat-val" style="color:var(--primary)">'+casesCount+'</div><div class="stat-lbl">Active Cases</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--error)">'+otr+'</div><div class="stat-lbl">OTR Theft</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--warning)">'+wimCount+'</div><div class="stat-lbl">WIM</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--success)">'+tasksDone+'</div><div class="stat-lbl">Tasks Done</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--info)">'+visited+'/'+totalSites+'</div><div class="stat-lbl">Sites Visited</div></div>';
}

function renderRotation() {
  var h = "";
  DATA.rotation.forEach(function(r) {
    var site = r.Site || r.site || "";
    var assignee = r.Assignee || r.assignee || "";
    var status = r.Status || r.status || "Pending";
    var cls = status === "Visited" ? "st-visited" : "st-pending";
    var icon = status === "Visited" ? "&#10003;" : "&#9711;";
    h += '<div class="rotation-row"><div class="site-badge '+siteClass(site)+'">'+site+'</div><div class="rotation-assignee">'+assignee+'</div><div class="rotation-status '+cls+'" onclick="toggleRotation('+i+')" style="cursor:pointer">'+icon+" "+status+'</div></div>';
  });
  document.getElementById("rotationList").innerHTML = h || '<div style="padding:12px;color:var(--muted)">No rotation data</div>';
}

function renderTeam() {
  var h = "";
  DATA.team.forEach(function(t, i) {
    var c = TEAM_COLORS[i % TEAM_COLORS.length];
    var name = t.Name || t.name || "";
    var initials = t.Initials || t.initials || name.split(" ").map(function(w){return w[0]}).join("");
    var location = t["Location Today"] || t.Location || t.location || "";
    h += '<div class="team-row"><div class="team-avatar" style="background:'+c.bg+';color:'+c.fg+'">'+initials+'</div><div class="team-name">'+name+'</div><div class="team-loc" onclick="editTeamLoc('+i+')" style="cursor:pointer">'+location+'</div></div>';
  });
  document.getElementById("teamList").innerHTML = h || '<div style="padding:12px;color:var(--muted)">No team data</div>';
}

function renderTaskBoard(targetId) {
  var todo = DATA.tasks.filter(function(t){return (t.Status||t.status)==="To Do";});
  var prog = DATA.tasks.filter(function(t){return (t.Status||t.status)==="In Progress";});
  var done = DATA.tasks.filter(function(t){return (t.Status||t.status)==="Done";});
  function card(t) {
    var task = t.Task || t.task || "";
    var assignee = t.Assignee || t.assignee || "";
    var priority = t.Priority || t.priority || "";
    var pcls = priority==="HIGH"?"priority-high":priority==="MED"?"priority-med":"priority-low";
    return '<div class="card" onclick="cycleTaskStatus('+t.id+')" style="cursor:pointer"><div class="card-title">'+task+'</div><div class="card-meta"><span class="card-detail">'+assignee+'</span><span class="card-tag '+pcls+'">'+priority+'</span></div></div>';
  }
  document.getElementById(targetId).innerHTML =
    '<div class="task-columns">'+
    '<div class="col-todo"><div class="task-col-header">To Do ('+todo.length+')</div>'+todo.map(card).join("")+'</div>'+
    '<div class="col-progress"><div class="task-col-header">In Progress ('+prog.length+')</div>'+prog.map(card).join("")+'</div>'+
    '<div class="col-done"><div class="task-col-header">Done ('+done.length+')</div>'+done.map(card).join("")+'</div>'+
    '</div>';
}

function renderCases() {
  var lynceus = DATA.lynceus || [];
  var route = DATA.route || [];
  var utr = DATA.utr || [];
  var wim = DATA.wim || [];
  var support = DATA.support || [];

  function renderList(list, targetId, tagClass) {
    if (list.length === 0) {
      document.getElementById(targetId).innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">No active cases</div>';
      return;
    }
    var h = "";
    list.forEach(function(c) {
      var title = c["Case Title"] || c.title || "";
      var site = c.Site || c.site || "";
      var owner = c.Owner || c.owner || "";
      var stage = c.Stage || c.stage || "";
      var progress = parseInt(c["Progress%"] || c.progress || 0);
      h += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div class="card-title">'+title+'</div><span class="card-tag '+tagClass+'">'+site+'</span></div><div class="progress"><div class="progress-bar" style="width:'+progress+'%"></div></div><div class="card-meta" style="margin-top:5px"><span class="card-detail">Owner: <span>'+owner+'</span></span><span class="card-detail">Stage: <span>'+stage+'</span></span></div></div>';
    });
    document.getElementById(targetId).innerHTML = h;
  }

  renderList(lynceus, "lynceusList", "tag-lynceus");
  renderList(route, "routeList", "tag-route");
  renderList(utr, "utrList", "tag-utr");
  renderList(wim, "wimList", "tag-wim");
  renderList(support, "supportList", "tag-support");
}

function renderProjects() {
  var h = "";
  DATA.projects.forEach(function(p) {
    var title = p["Project Title"] || p.title || "";
    var tag = p.Tag || p.tag || "";
    var desc = p.Description || p.desc || "";
    var owner = p.Owner || p.owner || "";
    var due = p["Due Date"] || p.due || "";
    h += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div class="card-title">'+title+'</div><span class="card-tag tag-audit">'+tag+'</span></div><div style="font-size:11px;color:var(--text2);margin-bottom:6px">'+desc+'</div><div class="card-meta"><span class="card-detail">'+owner+'</span><span class="card-detail">Due: <span>'+due+'</span></span></div></div>';
  });
  document.getElementById("projectsList").innerHTML = h || '<div style="padding:12px;color:var(--muted)">No projects</div>';
}

// ============================================================
// RENDER ALL & INIT
// ============================================================
function renderAll() {
  renderStats();
  renderRotation();
  renderTeam();
  renderTaskBoard("taskBoard");
  renderTaskBoard("fullTaskBoard");
  renderCases();
  renderProjects();
}

function updateClock() {
  var now = new Date();
  document.getElementById("clock").textContent = now.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",timeZone:"America/Chicago"}) + "  \u2022  " + now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false,timeZone:"America/Chicago"});
}

// Init
fetchAll();
updateClock();
setInterval(fetchAll, REFRESH_SECONDS * 1000);
setInterval(updateClock, 1000);

// GITHUB WRITE-BACK (Interactive editing)
// ============================================================
var GITHUB_REPO = "zhudskei/AMER-TX-AUS2-Board";
var GITHUB_TOKEN = "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"; // Paste your Personal Access Token here
var GITHUB_FILE = "data.json";

function pushToGitHub() {
  if (!GITHUB_TOKEN) return;
  var url = "https://api.github.com/repos/" + GITHUB_REPO + "/contents/" + GITHUB_FILE;
  
  // First get current file SHA
  fetch(url, { headers: {"Authorization": "token " + GITHUB_TOKEN} })
    .then(function(r) { return r.json(); })
    .then(function(file) {
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2))));
      return fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": "token " + GITHUB_TOKEN,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "Dashboard update",
          content: content,
          sha: file.sha
        })
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.content) {
        document.getElementById("lastUpdate").textContent = "Saved " + new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true,timeZone:"America/Chicago"});
      }
    })
    .catch(function(e) { console.error("GitHub push error:", e); });
}

// ============================================================
// INTERACTIVE ACTIONS
// ============================================================
function toggleRotation(i) {
  DATA.rotation[i].status = DATA.rotation[i].status === "Visited" ? "Pending" : "Visited";
  renderAll();
  pushToGitHub();
}

function editTeamLoc(i) {
  var loc = prompt("Update location for " + DATA.team[i].name + ":", DATA.team[i].location);
  if (loc !== null) { DATA.team[i].location = loc; renderAll(); pushToGitHub(); }
}

function cycleTaskStatus(id) {
  var t = DATA.tasks.find(function(x){return x.id===id});
  if (!t) return;
  var s = t.status || t.Status || "To Do";
  if (s === "To Do") { t.status = "In Progress"; t.Status = "In Progress"; }
  else if (s === "In Progress") { t.status = "Done"; t.Status = "Done"; }
  else { t.status = "To Do"; t.Status = "To Do"; }
  renderAll();
  pushToGitHub();
}
